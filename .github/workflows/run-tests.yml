name: Run solutions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-solutions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run every solution file
        run: |
          find topics -name "*.py" -print0 | while IFS= read -r -d '' file; do
            echo "Running $file"
            python "$file"
          done
